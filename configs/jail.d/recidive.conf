# =============================================================================
# /etc/fail2ban/jail.d/recidive.conf
#
# PURPOSE: Bans IPs that have been banned multiple times (repeat offenders).
#          The recidive jail watches fail2ban's own ban log and imposes a
#          long secondary ban when the same IP is banned repeatedly.
#
# PREREQUISITES:
#   This file provides TWO options. Use ONE based on your logtarget setting.
#   Check: sudo fail2ban-client get fail2ban logtarget
#
#   logtarget = SYSLOG or SYSTEMD-JOURNAL  →  use Option A (uncommented)
#   logtarget = /var/log/fail2ban.log       →  use Option B (comment A, uncomment B)
#
# INSTALL (Option A):
#   sudo cp filter.d/recidive-systemd.conf /etc/fail2ban/filter.d/
#   sudo cp jail.d/recidive.conf /etc/fail2ban/jail.d/
#   sudo fail2ban-client reload
#
# WARNING — dbpurgeage interaction:
#   The recidive jail uses findtime = 12h. Your dbpurgeage in fail2ban.local
#   MUST be >= 12h (43200s). The default 86400 (24h) is safe. If dbpurgeage
#   is shorter than findtime, recidive will silently miss repeat offenders.
#   Set dbpurgeage = 7d (604800) for maximum recidive effectiveness.
#
# Reference: Module 10 — Advanced Topics (Section 2: The Recidive Jail)
# =============================================================================

# =============================================================================
# OPTION A — systemd-backend recidive (recommended for default RHEL 10)
# Requires: filter.d/recidive-systemd.conf installed
# =============================================================================
[recidive]
enabled   = true
filter    = recidive-systemd
backend   = systemd

# Ban if the same IP is banned 3+ times within 12 hours
maxretry  = 3
findtime  = 12h

# Secondary ban: 1 week
bantime   = 1w

# Block ALL ports for repeat offenders
banaction = firewallcmd-allports


# =============================================================================
# OPTION B — flat-file recidive (only if logtarget = /var/log/fail2ban.log)
# Comment out Option A above and uncomment this section.
# =============================================================================
# [recidive]
# enabled   = true
# filter    = recidive
# backend   = auto
# logpath   = /var/log/fail2ban.log
#
# # Ban if the same IP is banned 3+ times within 12 hours
# maxretry  = 3
# findtime  = 12h
#
# # Secondary ban: 1 week
# bantime   = 1w
#
# # Block ALL ports for repeat offenders
# banaction = firewallcmd-allports
