# =============================================================================
# /etc/fail2ban/filter.d/recidive-systemd.conf
#
# PURPOSE: Custom recidive filter that reads fail2ban ban events directly
#          from the systemd journal (journald).
#
# USE WHEN: logtarget = SYSLOG or logtarget = SYSTEMD-JOURNAL (RHEL 10 default)
#
# INSTALL:  sudo cp recidive-systemd.conf /etc/fail2ban/filter.d/
#           sudo fail2ban-client reload
#
# Reference: Module 10 — Advanced Topics (Section 2: The Recidive Jail)
# =============================================================================

[Definition]

# Match journal entries from the fail2ban service unit only
journalmatch = _SYSTEMD_UNIT=fail2ban.service

# Match fail2ban's "Ban <IP>" NOTICE lines in the journal.
# The pattern handles the [jail-name] prefix and the IP at the end.
failregex = fail2ban\.actions\S+\s+NOTICE\s+\[\S+\] Ban <HOST>

ignoreregex =
